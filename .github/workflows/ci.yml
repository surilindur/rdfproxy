name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
     - cron: "0 0 * * 6"

env:
  DEFAULT_PYTHON_VERSION: 3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Use Python ${{ env.DEFAULT_PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON_VERSION }}
          cache: pip
      - name: Update pip and setuptools
        run: python -m pip install --upgrade pip setuptools
      - name: Install project dependencies
        run: python -m pip install -r requirements.txt
      - name: Install pylint
        run: python -m pip install pylint
      - name: Run linter
        run: python -m pylint --output-format colorized --max-line-length 88 ./rdfdp
  test:
    name: Test
    needs: lint
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
        tool:
          - docker
          - podman
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build Apache Jena container
        run: ${{ matrix.tool }} compose --file example/compose.yml build
      - name: Start Apache Jena container
        run: ${{ matrix.tool }} compose --file example/compose.yml start
      - name: Build application image
        run: ${{ matrix.tool }} build --tag localhost/rdfgp:dev .
      - name: Create application container
        run: ${{ matrix.tool }} create --name rdfgp localhost/rdfgp:dev
      - name: Start application container
        run: ${{ matrix.tool }} start rdfgp
      - name: Wait for application to be available
        run: curl --head --retry 20 --retry-all-errors --retry-delay 1 http://localhost:8000/
      - name: Test document conversion for HTML
        run: |
          curl --head --fail-with-body --header "accept: text/html" http://localhost:8000/
      - name: Test document conversion for Turtle
        run: |
          curl --head --fail-with-body --header "accept: text/turtle" http://localhost:8000/
      - name: Test document conversion for N3
        run: |
          curl --head --fail-with-body --header "accept: text/n3" http://localhost:8000/
      - name: Test document conversion for N-Triples
        run: |
          curl --head --fail-with-body --header "accept: application/n-triples" http://localhost:8000/
      - name: Test document conversion for JSON-LD
        run: |
          curl --head --fail-with-body --header "accept: application/ld+json" http://localhost:8000/
      - name: Test document conversion for RDF+XML
        run: |
          curl --head --fail-with-body --header "accept: application/rdf+xml" http://localhost:8000/
      - name: Test document conversion for HTML with type-specific template
        run: |
          curl --head --fail-with-body --header "accept: text/html" http://localhost:8000/document
      - name: Test HTTP redirection for owl:sameAs
        run: |
          curl --head --fail-with-body http://localhost:8000/redirected
      - name: Stop application container
        if: always()
        run: ${{ matrix.tool }} stop rdfgp
      - name: Start Apache Jena container
        if: always()
        run: ${{ matrix.tool }} compose --file example/compose.yml stop
